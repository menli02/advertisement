Name: auth.rpc
ListenOn: 0.0.0.0:9001
Mode: dev

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: auth.rpc

Postgres:
  DSN: postgres://postgres:<DB_PASSWORD>@127.0.0.1:5432/advertisement?sslmode=disable

Redis:
  Addr: 127.0.0.1:6379
  Password: ""
  DB: 0

App:
  TempJWTSecret: <TEMP_JWT_SECRET>
  JWTSecret: <JWT_SECRET>
  RefreshJWTSecret: <REFRESH_JWT_SECRET>
